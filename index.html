<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle">Light Mode</button>
        <h1>Lotto Number Generator</h1>
        
        <div class="main-controls">
            <button id="generator-btn">Random Numbers</button>
            <button id="recommend-btn">Winning Based (5 sets)</button>
        </div>

        <div id="lotto-numbers-container"></div>
        
        <div id="recommend-container" class="hidden">
            <h3>Recommended Sets (Based on Last Winner)</h3>
            <div id="recommend-list"></div>
        </div>

        <hr class="divider">

        <div class="contact-section">
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mnjwewoj" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="_replyto" id="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
